server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — все unknown paths отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Длинный кэш для хешированных asset'ов
    location ~* \.(?:js|css|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — без кэша, чтобы новые сборки сразу подхватывались
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Скрыть nginx version
    server_tokens off;
}
